services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: nexo
      POSTGRES_DB: nexo
    ports:
      - "5434:5432"
    volumes:
      - nexo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  nexo_postgres:
